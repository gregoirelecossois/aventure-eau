<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Aventure de l'Eau — Jeux de révision</title>
<!-- Police emoji identique sur tous les appareils, hébergée en local (hors-ligne) -->
<link href="fonts/noto-color-emoji.css" rel="stylesheet">
<style>
/* ============================================================
   L'AVENTURE DE L'EAU — feuille de style
   Palette « lagon au trésor » : mer profonde, parchemin, or,
   accents vifs par île. Type ronde et grosse (FALC / SEGPA).
   ============================================================ */
:root{
  --sea-deep:#0B3C5D;
  --sea:#1565C0;
  --sky:#4FC3F7;
  --parch:#F4E4C1;
  --parch-dk:#E4CE9E;
  --gold:#FFC107;
  --gold-dk:#E8A200;
  --coral:#FF6B6B;
  --green:#26A69A;
  --ink:#143642;
  --paper:#FFFDF6;
  --shadow:0 8px 0 rgba(0,0,0,.18);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:"Trebuchet MS","Verdana","Noto Color Emoji",sans-serif;
  color:var(--ink);
  background:linear-gradient(180deg,#5EC8F2 0%,#2E9BD6 45%,#1565C0 100%);
  overflow-x:hidden;
  font-size:19px;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:980px;margin:0 auto;padding:14px;min-height:100%;}
h1,h2,h3{font-family:"Arial Rounded MT Bold","Trebuchet MS","Noto Color Emoji",sans-serif;margin:0 0 .3em;line-height:1.1;}
button{font-family:inherit;cursor:pointer;border:none;}
img{max-width:100%;}

/* --- Boutons gros et tactiles --- */
.btn{
  display:inline-flex;align-items:center;gap:.5em;justify-content:center;
  background:var(--gold);color:#5A3E00;font-weight:bold;font-size:1.25rem;
  padding:.7em 1.4em;border-radius:18px;border-bottom:5px solid var(--gold-dk);
  box-shadow:0 4px 0 rgba(0,0,0,.12);transition:transform .08s,filter .15s;
  text-decoration:none;
}
.btn:hover{filter:brightness(1.05);}
.btn:active{transform:translateY(3px);border-bottom-width:2px;}
.btn.big{font-size:1.6rem;padding:.8em 1.8em;border-radius:24px;}
.btn.sea{background:var(--sky);color:#08344F;border-bottom-color:#1E88B5;}
.btn.coral{background:var(--coral);color:#fff;border-bottom-color:#D94A4A;}
.btn.ghost{background:rgba(255,255,255,.85);color:var(--sea-deep);border-bottom-color:#9CC;}
.btn:disabled{filter:grayscale(.6);opacity:.6;cursor:not-allowed;}

/* --- Cartes / panneaux parchemin --- */
.panel{
  background:var(--paper);border-radius:28px;padding:22px;
  box-shadow:0 12px 30px rgba(0,40,80,.28);border:4px solid #fff;
}
.parchment{
  background:
    radial-gradient(circle at 20% 18%, #fbf0d6 0%, transparent 60%),
    radial-gradient(circle at 85% 80%, #ecd9ad 0%, transparent 55%),
    var(--parch);
  border:6px solid #c8a86a;border-radius:26px;
  box-shadow:inset 0 0 60px rgba(150,110,40,.25),0 12px 30px rgba(0,40,80,.3);
}

/* --- HUD haut : prénom + coffre à médailles --- */
.hud{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  background:rgba(255,255,255,.92);border-radius:20px;padding:10px 16px;
  margin-bottom:14px;box-shadow:0 6px 16px rgba(0,40,80,.2);
}
.hud .who{font-weight:bold;font-size:1.15rem;display:flex;align-items:center;gap:8px;}
.hud .who .av{width:38px;height:38px;}
.shelf{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;align-items:center;}
.shelf .slot{
  width:40px;height:40px;border-radius:50%;display:grid;place-items:center;
  font-size:20px;background:#E9EEF2;border:3px dashed #C2CDD6;color:#9fb0bd;
  filter:grayscale(1);transition:.3s;
}
.shelf .slot.has{
  filter:none;border:3px solid #fff;color:#fff;
  box-shadow:0 0 0 3px var(--gold),0 4px 10px rgba(0,0,0,.25);
  animation:pop .5s;
}
@keyframes pop{0%{transform:scale(0) rotate(-40deg);}70%{transform:scale(1.3) rotate(8deg);}100%{transform:scale(1);}}
.hud .progress{font-weight:bold;color:var(--sea-deep);background:#EAF6FF;padding:4px 12px;border-radius:14px;}
.profbtn{
  background:none;border:none;font-size:1.1rem;color:var(--sea-deep);
  opacity:.55;text-decoration:underline;padding:4px 8px;
}

/* ============ ACCUEIL ============ */
.welcome{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;padding-top:18px;}
.welcome h1{font-size:2.9rem;color:#fff;text-shadow:0 4px 0 #0A3A5C,0 7px 14px rgba(0,0,0,.3);}
.welcome .sub{color:#EAF6FF;font-size:1.3rem;margin-bottom:6px;text-shadow:0 2px 4px rgba(0,0,0,.3);}
.namebox{margin-top:6px;}
.namebox input{
  font-family:inherit;font-size:1.5rem;padding:.55em .8em;border-radius:18px;
  border:4px solid var(--gold);width:min(440px,86vw);text-align:center;
  box-shadow:0 6px 0 var(--gold-dk);color:var(--ink);
}
.resume-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;}
.resume-list .pill{
  background:rgba(255,255,255,.9);border-radius:16px;padding:.4em .9em;font-weight:bold;
  color:var(--sea-deep);border-bottom:4px solid #9CC;font-size:1.05rem;
}

/* ============ CARTE AU TRÉSOR ============ */
.maptitle{text-align:center;color:#fff;text-shadow:0 3px 0 #0A3A5C;font-size:2rem;margin:4px 0 12px;}
.mapstage{position:relative;width:100%;}
.mapsvgwrap{position:relative;width:100%;border-radius:26px;overflow:hidden;}
.island{
  position:absolute;transform:translate(-50%,-50%);text-align:center;width:128px;cursor:pointer;
  transition:transform .15s;
}
.island:hover{transform:translate(-50%,-50%) scale(1.05);}
.island .disc{
  width:92px;height:92px;margin:0 auto;border-radius:50%;display:grid;place-items:center;
  font-size:46px;background:#fff;box-shadow:0 8px 0 rgba(0,0,0,.18),inset 0 0 0 6px rgba(255,255,255,.7);
  position:relative;
}
.island .label{
  margin-top:6px;background:rgba(255,255,255,.95);border-radius:12px;padding:3px 8px;
  font-weight:bold;font-size:.85rem;color:var(--ink);box-shadow:0 3px 6px rgba(0,0,0,.2);
  display:inline-block;max-width:120px;line-height:1.1;
}
.island.locked{filter:grayscale(.85) brightness(.92);cursor:not-allowed;}
.island.locked .disc::after{content:"🔒";position:absolute;font-size:30px;filter:none;}
.island.current .disc{animation:bob 1.1s ease-in-out infinite;box-shadow:0 0 0 6px var(--gold),0 10px 0 rgba(0,0,0,.18);}
.island.current::after{
  content:"JOUE ICI";position:absolute;left:50%;top:-22px;transform:translateX(-50%);
  background:var(--coral);color:#fff;font-weight:bold;font-size:.72rem;padding:3px 8px;border-radius:10px;
  box-shadow:0 3px 6px rgba(0,0,0,.25);white-space:nowrap;animation:bob 1.1s infinite;
}
.island.done .disc{box-shadow:0 0 0 6px var(--gold),0 8px 0 rgba(0,0,0,.18);}
.island.done .flag{position:absolute;top:-14px;right:6px;font-size:26px;animation:wave 1.4s infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes wave{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(8deg);}}
.dashpath{stroke:#7a5a2a;stroke-width:6;stroke-dasharray:2 16;stroke-linecap:round;fill:none;opacity:.8;
  stroke-dashoffset:0;animation:march 18s linear infinite;}
@keyframes march{to{stroke-dashoffset:-360;}}

/* ============ SCÈNE DE JEU ============ */
.gamehead{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.gamehead .ic{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;font-size:34px;background:#fff;box-shadow:var(--shadow);}
.gamehead h2{color:#fff;text-shadow:0 3px 0 rgba(0,0,0,.25);font-size:1.7rem;}
.gamehead .pts{margin-left:auto;background:#fff;border-radius:14px;padding:6px 12px;font-weight:bold;}
.instr{display:flex;gap:12px;align-items:center;background:#EAF6FF;border-left:8px solid var(--sea);
  border-radius:14px;padding:12px 16px;margin-bottom:16px;font-size:1.15rem;}
.instr .mas{width:54px;flex:0 0 54px;}
.gamearea{min-height:300px;}

/* gouttes / tri */
.cardflow{display:flex;flex-direction:column;align-items:center;gap:18px;}
.flowcard{
  background:#fff;border-radius:22px;padding:26px 22px;font-size:1.5rem;text-align:center;
  width:min(640px,92vw);box-shadow:0 10px 24px rgba(0,40,80,.25);border:4px solid #DCEBF7;
  min-height:120px;display:grid;place-items:center;
}
.sortbtns{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;}
.basket{
  flex:1 1 220px;max-width:300px;border-radius:22px;padding:18px;text-align:center;color:#fff;
  font-weight:bold;font-size:1.3rem;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.18);
  transition:transform .1s;
}
.basket:active{transform:translateY(3px);}
.basket.b1{background:#42A5F5;border-bottom:5px solid #1E78C2;}
.basket.b2{background:#26A69A;border-bottom:5px solid #1B7A70;}
.flowmeter{width:min(640px,92vw);height:18px;background:#cfe3f2;border-radius:10px;overflow:hidden;}
.flowmeter>i{display:block;height:100%;background:linear-gradient(90deg,#4FC3F7,#1565C0);width:0;transition:width .4s;}

/* memory */
.memgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:680px;margin:0 auto;}
@media(max-width:560px){.memgrid{grid-template-columns:repeat(2,1fr);}}
.memcard{aspect-ratio:3/4;border-radius:18px;position:relative;cursor:pointer;perspective:800px;}
.memcard .face{position:absolute;inset:0;border-radius:18px;display:grid;place-items:center;
  backface-visibility:hidden;transition:transform .4s;padding:10px;text-align:center;font-weight:bold;}
.memcard .back{background:linear-gradient(135deg,#1565C0,#4FC3F7);color:#fff;font-size:2.4rem;transform:rotateY(0);}
.memcard .front{background:#fff;color:var(--ink);font-size:1rem;transform:rotateY(180deg);border:4px solid #DCEBF7;}
.memcard.flip .back{transform:rotateY(180deg);}
.memcard.flip .front{transform:rotateY(360deg);}
.memcard.done{animation:matched .5s;}
.memcard.done .front{border-color:#43A047;background:#E8F5E9;}
@keyframes matched{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}

/* ordre usine */
.orderlist{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:8px;}
.orderrow{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:8px 10px;
  box-shadow:0 4px 10px rgba(0,40,80,.12);border:3px solid #FFE0B2;}
.orderrow.ok{border-color:#43A047;background:#E8F5E9;}
.orderrow.bad{animation:shake .4s;border-color:#E53935;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.orderrow .num{flex:0 0 38px;height:38px;border-radius:50%;background:#FB8C00;color:#fff;font-weight:bold;display:grid;place-items:center;}
.orderrow .txt{flex:1;font-size:1rem;}
.orderrow .ic{font-size:1.6rem;flex:0 0 auto;}
.arrows{display:flex;flex-direction:column;gap:3px;}
.arrows button{width:34px;height:24px;border-radius:8px;background:#FFE0B2;font-weight:bold;border-bottom:3px solid #E8A24A;}
.arrows button:active{transform:translateY(2px);}

/* drag & drop usine */
.drag-handle{font-size:1.5rem;cursor:grab;color:#b0bec5;flex:0 0 auto;padding:0 6px;user-select:none;line-height:1;touch-action:none;}
.drag-handle:active{cursor:grabbing;}
.orderrow[draggable]{cursor:default;}
.orderrow.dragging{opacity:.35;background:#FFF8E7;border-style:dashed;}
.orderrow.drag-over{border-color:var(--sea);background:#E3F2FD;transform:scale(1.025);box-shadow:0 0 0 3px var(--sky);}

/* boss — vies joueur */
.player-hpbar{display:flex;gap:4px;align-items:center;font-size:2rem;line-height:1;}

/* boss — effets attaque */
@keyframes bossShake{0%,100%{transform:translateX(0) rotate(0deg);}15%{transform:translateX(-18px) rotate(-2deg);}35%{transform:translateX(18px) rotate(2deg);}55%{transform:translateX(-12px) rotate(-1deg);}75%{transform:translateX(12px) rotate(1deg);}92%{transform:translateX(-5px);}}
@keyframes attackPop{0%{transform:translateX(-50%) scale(.2);opacity:1;}55%{transform:translateX(-50%) scale(2);opacity:1;}100%{transform:translateX(-50%) scale(3);opacity:0;}}
@keyframes screenFlash{0%,100%{opacity:0;}25%{opacity:1;}}

/* château / cloze */
.clozewrap{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;justify-content:center;}
.towerbox{flex:0 0 230px;text-align:center;}
.tower-svg{width:210px;}
.clozetext{flex:1 1 380px;background:#fff;border-radius:18px;padding:18px 20px;font-size:1.25rem;line-height:2.1;
  box-shadow:0 6px 16px rgba(0,40,80,.15);border:4px solid #E1BEE7;}
.blank{display:inline-block;min-width:120px;border-bottom:4px dashed #8E24AA;margin:0 4px;text-align:center;
  color:#8E24AA;font-weight:bold;cursor:pointer;border-radius:8px;padding:0 6px;}
.blank.filled{border-bottom-style:solid;background:#F3E5F5;}
.blank.ok{border-color:#43A047;color:#2E7D32;background:#E8F5E9;}
.wordpool{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:16px;}
.word{background:#8E24AA;color:#fff;font-weight:bold;border-radius:14px;padding:.5em 1em;font-size:1.15rem;
  box-shadow:0 4px 0 #5E1772;}
.word.sel{outline:4px solid var(--gold);transform:translateY(-3px);}
.word.used{opacity:.3;pointer-events:none;}

/* pollueurs */
.pondwrap{position:relative;}
.bubblearea{position:relative;height:340px;border-radius:20px;overflow:hidden;
  background:linear-gradient(180deg,#9CCC65 0%,#7CB342 45%,#558B2F 100%);box-shadow:inset 0 0 40px rgba(0,0,0,.25);}
.pollbubble{position:absolute;bottom:-90px;left:50%;transform:translateX(-50%);
  background:#fff;border-radius:50% 50% 48% 52%;padding:14px 16px;min-width:150px;max-width:210px;text-align:center;
  font-weight:bold;font-size:.98rem;box-shadow:0 6px 14px rgba(0,0,0,.3);cursor:pointer;border:4px solid #C5E1A5;}
.catbtns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:14px;}
.catbtn{flex:1 1 150px;max-width:220px;color:#fff;font-weight:bold;border-radius:16px;padding:14px;font-size:1.1rem;box-shadow:0 5px 0 rgba(0,0,0,.2);}
.catbtn:active{transform:translateY(3px);}
.cat-agri{background:#FBC02D;color:#5A3E00;border-bottom:5px solid #C99A00;}
.cat-indus{background:#757575;border-bottom:5px solid #4F4F4F;}
.cat-dom{background:#42A5F5;border-bottom:5px solid #1E78C2;}
.sortcols{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:560px){.sortcols{grid-template-columns:1fr;}}
.sortcol{border-radius:16px;padding:10px;min-height:90px;color:#fff;}
.sortcol h4{margin:0 0 6px;text-align:center;}
.sortchip{background:#fff;color:var(--ink);border-radius:12px;padding:8px 10px;margin:6px 0;font-size:.95rem;
  box-shadow:0 3px 8px rgba(0,0,0,.15);cursor:pointer;}
.sortchip.sel{outline:4px solid var(--gold);}
/* éclatement de bulle (marais des pollueurs) */
.bubble-pop-piece{position:absolute;width:11px;height:11px;border-radius:50%;
  background:radial-gradient(circle at 35% 32%,#fff,#9fd3ff);
  box-shadow:0 0 7px rgba(255,255,255,.75);pointer-events:none;
  transform:translate(-50%,-50%);animation:bubblePiece .5s ease-out forwards;}
@keyframes bubblePiece{
  0%{opacity:1;transform:translate(-50%,-50%) scale(.5);}
  70%{opacity:1;}
  100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1);}
}

/* boss */
.bossstage{text-align:center;}
.monster{font-size:120px;display:inline-block;filter:drop-shadow(0 8px 0 rgba(0,0,0,.2));transition:transform .15s;}
.monster.hit{animation:hit .4s;}
@keyframes hit{0%{transform:translateX(0) rotate(0);}25%{transform:translateX(-14px) rotate(-6deg);}75%{transform:translateX(14px) rotate(6deg);}}
.hpbar{width:min(420px,80vw);height:22px;background:#ffd2d2;border-radius:12px;margin:8px auto 4px;overflow:hidden;border:3px solid #fff;}
.hpbar>i{display:block;height:100%;background:linear-gradient(90deg,#E53935,#FF8A80);transition:width .4s;}
.qcard{background:#fff;border-radius:20px;padding:20px;max-width:640px;margin:14px auto 0;box-shadow:0 8px 20px rgba(0,40,80,.2);border:4px solid #B2DFDB;}
.qcard .q{font-size:1.3rem;font-weight:bold;margin-bottom:14px;}
.answers{display:flex;flex-direction:column;gap:10px;}
.ans{background:#E0F2F1;border-radius:14px;padding:12px 16px;font-size:1.15rem;text-align:left;
  border-bottom:4px solid #80CBC4;color:var(--ink);font-weight:bold;}
.ans:hover{filter:brightness(.98);}
.ans.good{background:#C8E6C9;border-bottom-color:#66BB6A;}
.ans.wrong{background:#FFCDD2;border-bottom-color:#EF9A9A;}

/* résultat */
.result{text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;padding-top:10px;}
.result h2{font-size:2.2rem;color:#fff;text-shadow:0 3px 0 rgba(0,0,0,.25);}
.bigbadge{width:170px;height:170px;border-radius:50%;display:grid;place-items:center;font-size:84px;
  background:radial-gradient(circle at 50% 35%,#FFF3C4,#FFC107);box-shadow:0 0 0 10px #fff,0 14px 30px rgba(0,0,0,.3);
  animation:pop .6s;}
.scorebig{font-size:2.6rem;font-weight:bold;color:#fff;text-shadow:0 3px 0 rgba(0,0,0,.25);}
.fb{background:rgba(255,255,255,.95);border-radius:18px;padding:14px 18px;font-size:1.15rem;max-width:560px;}

/* feedback toast */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(120%);
  background:var(--ink);color:#fff;padding:14px 22px;border-radius:18px;font-size:1.2rem;font-weight:bold;
  box-shadow:0 10px 30px rgba(0,0,0,.4);transition:transform .3s;z-index:60;text-align:center;max-width:90vw;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.good{background:#2E7D32;}
.toast.bad{background:#C62828;}

/* confetti */
.confetti{position:fixed;top:-20px;width:12px;height:18px;z-index:70;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);}}

/* finale / diplôme */
.diploma{background:var(--paper);border:10px double var(--gold-dk);border-radius:20px;padding:30px;text-align:center;max-width:680px;margin:0 auto;}
.diploma h2{font-size:2.2rem;color:var(--sea-deep);}
.diploma .name{font-size:2rem;color:var(--coral);font-family:"Arial Rounded MT Bold",cursive;margin:10px 0;}
.medrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px 0;}
.medrow .m{width:62px;height:62px;border-radius:50%;display:grid;place-items:center;font-size:30px;
  background:radial-gradient(circle at 50% 35%,#FFF3C4,#FFC107);box-shadow:0 0 0 4px #fff,0 5px 12px rgba(0,0,0,.25);}

/* tableau prof */
.dash{background:var(--paper);border-radius:20px;padding:18px;}
.dash table{width:100%;border-collapse:collapse;font-size:.95rem;}
.dash th,.dash td{padding:8px 10px;border-bottom:1px solid #e3e9ee;text-align:left;}
.dash th{background:#EAF6FF;color:var(--sea-deep);}
.minibar{display:inline-block;width:46px;height:10px;background:#e3e9ee;border-radius:6px;overflow:hidden;vertical-align:middle;}
.minibar>i{display:block;height:100%;background:#43A047;}
.dashtools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.dashtools .btn{font-size:1rem;padding:.5em 1em;}
.badge-mini{font-size:1.1rem;}
.syncbadge{font-size:.8rem;padding:3px 10px;border-radius:10px;font-weight:bold;}
.sync-on{background:#C8E6C9;color:#1B5E20;}
.sync-off{background:#FFE0B2;color:#7A4A00;}

.center{text-align:center;}
.mt{margin-top:16px;}
.hidden{display:none!important;}

/* ===== Affichage plein écran du diplôme (overlay) ===== */
.diplomaView{
  position:fixed;inset:0;z-index:120;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;gap:18px;padding:24px 16px;overflow:auto;
  background:linear-gradient(180deg,#0B3C5D 0%,#1565C0 100%);
}
.diploma-sheet{
  background:
    radial-gradient(circle at 18% 14%, #fff7e4 0%, transparent 55%),
    radial-gradient(circle at 84% 86%, #f0dcae 0%, transparent 55%),
    var(--paper);
  border:14px double var(--gold-dk);border-radius:18px;padding:38px 34px;text-align:center;
  width:min(820px,94vw);box-shadow:0 22px 60px rgba(0,0,0,.45);position:relative;
  -webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;
}
.diploma-sheet::before{
  content:"";position:absolute;inset:14px;border:2px solid var(--gold);border-radius:10px;pointer-events:none;opacity:.55;
}

const Store = (()=>{ let mem={},ok=false;
  try{localStorage.setItem("__t","1");localStorage.removeItem("__t");ok=true;}catch(e){ok=false;}
  return{
    get(k){try{return ok?localStorage.getItem(k):(k in mem?mem[k]:null);}catch(e){return k in mem?mem[k]:null;}},
    set(k,v){try{ok?localStorage.setItem(k,v):(mem[k]=v);}catch(e){mem[k]=v;}},
    del(k){try{ok?localStorage.removeItem(k):delete mem[k];}catch(e){delete mem[k];}}
  };
})();
const safeKey = n => (n||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g,"_").slice(0,40) || "anon";
const localKey = n => `eauquest_${CONFIG.sessionCode}_s_${safeKey(n)}`;
const regKey   = ()=> `eauquest_${CONFIG.sessionCode}_reg`;
const curKey   = ()=> `eauquest_${CONFIG.sessionCode}_current`;   // élève courant (passé à AquaRun)
const aquaPendKey = ()=> `eauquest_${CONFIG.sessionCode}_aquapend`; // scores AquaRun à resynchroniser

/* ============================================================
   SYNCHRONISATION (local par défaut, Firebase si configuré)
   ============================================================ */
const Sync = {
  mode:"local", db:null,
  async init(){
    if(CONFIG.firebase && CONFIG.firebase.databaseURL){
      try{
        await this._load("https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js");
        await this._load("https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js");
        firebase.initializeApp(CONFIG.firebase);
        this.db=firebase.database();
        this.mode="firebase";
      }catch(e){ this.mode="local"; }
    }
  },
  _load(src){return new Promise((res,rej)=>{const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});},
  _path(n){return `eauquest/${CONFIG.sessionCode}/students/${safeKey(n)}`;},
  save(student){
    Store.set(localKey(student.name),JSON.stringify(student));
    try{const reg=JSON.parse(Store.get(regKey())||"[]");if(!reg.includes(student.name)){reg.push(student.name);Store.set(regKey(),JSON.stringify(reg));}}catch(e){}
    if(this.mode==="firebase"){try{this.db.ref(this._path(student.name)).set(student);}catch(e){}}
  },
  loadLocal(n){const r=Store.get(localKey(n));return r?JSON.parse(r):null;},
  async getAll(){
    if(this.mode==="firebase"){
      try{const snap=await this.db.ref(`eauquest/${CONFIG.sessionCode}/students`).get();return Object.values(snap.val()||{});}catch(e){return this._allLocal();}
    }
    return this._allLocal();
  },
  _allLocal(){try{const reg=JSON.parse(Store.get(regKey())||"[]");return reg.map(n=>this.loadLocal(n)).filter(Boolean);}catch(e){return [];}},
  onAll(cb){
    if(this.mode==="firebase"){try{this.db.ref(`eauquest/${CONFIG.sessionCode}/students`).on("value",s=>cb(Object.values(s.val()||{})));return;}catch(e){}}
    this.getAll().then(cb);
  },
  reset(name){ Store.del(localKey(name)); try{const reg=JSON.parse(Store.get(regKey())||"[]").filter(x=>x!==name);Store.set(regKey(),JSON.stringify(reg));}catch(e){} if(this.mode==="firebase"){try{this.db.ref(this._path(name)).remove();}catch(e){}} }
};

/* Éclatement d'une bulle (marais des pollueurs) : la bulle gonfle puis explose
   en projetant des gouttelettes, au lieu de simplement disparaître. */
function popBubble(container, bub){
  if(!bub) return;
  const br=bub.getBoundingClientRect(), ar=container.getBoundingClientRect();
  const cx=br.left-ar.left+br.width/2, cy=br.top-ar.top+br.height/2;
  const N=9;
  for(let i=0;i<N;i++){
    const ang=(Math.PI*2*i)/N + Math.random()*0.5;
    const dist=28+Math.random()*30;
    const piece=document.createElement("div");
    piece.className="bubble-pop-piece";
    piece.style.left=cx+"px"; piece.style.top=cy+"px";
    piece.style.setProperty("--dx",(Math.cos(ang)*dist).toFixed(1)+"px");
    piece.style.setProperty("--dy",(Math.sin(ang)*dist).toFixed(1)+"px");
    container.appendChild(piece);
    setTimeout(()=>piece.remove(),520);
  }
  // la bulle gonfle (squash) puis éclate
  bub.animate([
    {transform:"translateX(-50%) scale(1)",   opacity:1, offset:0},
    {transform:"translateX(-50%) scale(1.35)",opacity:1, offset:0.35},
    {transform:"translateX(-50%) scale(.1)",  opacity:0, offset:1}
  ],{duration:360,easing:"ease-out",fill:"forwards"});
}

/* ============================================================
   SUIVI D'ERREUR — uniquement exercices 1 (Tri) et 5 (Pollueurs)
   1 erreur tolérée sur ces deux exercices :
   • 1ʳᵉ erreur  -> grosse popup de correction, à FERMER manuellement.
   • 2ᵉ erreur   -> popup bloquante, bouton « Réessayer » obligatoire.
   Les autres exercices (Memory, Usine, Château) et le boss gardent
   leur fonctionnement d'origine (zéro erreur tolérée / 100 % requis).
   ============================================================ */
const ERR_BUDGET = 1; // erreurs tolérées sur les exercices concernés
// Seuls le Tri (sort) et les Pollueurs (pollution) ont le « joker erreur ».
function hasErrorJoker(st){ return !!st && (st.type==="sort" || st.type==="pollution"); }

function clearErrorUI(){
  document.querySelectorAll(".errtracker,.errpop-overlay").forEach(e=>e.remove());
}
function mountErrorTracker(){
  document.querySelectorAll(".errtracker").forEach(e=>e.remove());
  const t=el(`<div class="errtracker" id="errTracker">
      <span class="et-ico">❤️</span>
      <span class="et-txt">Joker erreur<br><b>1 rattrapage</b></span>
    </div>`);
  document.body.appendChild(t);
}
function updateErrorTracker(){
  const t=document.getElementById("errTracker"); if(!t)return;
  const left=Math.max(0,ERR_BUDGET-(cur.errors||0));
  if(left>0){
    t.classList.remove("used");
    t.querySelector(".et-ico").textContent="❤️";
    t.querySelector(".et-txt").innerHTML=`Joker erreur<br><b>${left} rattrapage</b>`;
  }else{
    t.classList.add("used");
    t.querySelector(".et-ico").textContent="💔";
    t.querySelector(".et-txt").innerHTML=`Plus de joker&nbsp;!<br><b>Sois prudent</b>`;
  }
}

/* Enregistre une erreur et affiche la popup adaptée.
   Renvoie une Promise résolue quand le joueur ferme la 1ʳᵉ popup ;
   en cas de 2ᵉ erreur la popup est bloquante et relance l'exercice
   (la Promise ne se résout pas, le code suivant n'est donc pas exécuté). */
function registerError(correctionHtml){
  if(!hasErrorJoker(cur.stage)) return Promise.resolve();
  cur.errors=(cur.errors||0)+1;
  updateErrorTracker();
  const blocking = cur.errors>ERR_BUDGET; // 2ᵉ erreur -> bloquant
  return new Promise(resolve=>{ showErrorPopup(correctionHtml, blocking, resolve); });
}

function showErrorPopup(correctionHtml, blocking, onClose){
  document.querySelectorAll(".errpop-overlay").forEach(e=>e.remove());
  const note = blocking
    ? `<div class="ep-note danger">2ᵉ erreur sur cet exercice. Tu dois recommencer depuis le début pour gagner ta médaille.</div>`
    : `<div class="ep-note">⚠️ Il te reste <b>0 joker</b>&nbsp;: à la prochaine erreur, il faudra recommencer l'exercice.</div>`;
  const action = blocking
    ? `<button class="btn big coral" id="epRetry">🔁 Réessayer l'exercice</button>`
    : `<button class="btn big" id="epClose">👍 J'ai compris, je continue</button>`;
  const ov=el(`<div class="errpop-overlay">
      <div class="errpop ${blocking?'block':''}" role="alertdialog" aria-modal="true">
        <div class="ep-ico">${blocking?'🚫':'❌'}</div>
        <h3>${blocking?'Oups, 2ᵉ erreur&nbsp;!':'Petite erreur…'}</h3>
        <div class="ep-body">${correctionHtml}</div>
        ${note}
        ${action}
      </div>
    </div>`);
  document.body.appendChild(ov);
  // Le clic sur le fond ne ferme rien : on oblige à lire puis à cliquer le bouton.
  if(blocking){
    ov.querySelector("#epRetry").onclick=()=>{ ov.remove(); renderGame(cur.index); };
  }else{
    ov.querySelector("#epClose").onclick=()=>{ ov.remove(); onClose&&onClose(); };
  }
}

  async function answer(choice){

      fc.style.borderColor="#DCEBF7";idx++;show();busy=false;
    }
  }
  mount.querySelector("#bP").onclick=()=>answer("propre");
  mount.querySelector("#bO").onclick=()=>answer("potable");
  function finish(){ fm.style.width="100%"; finishStage(Math.round(correct/items.length*100), correct, items.length); }
  show();
}

  const d=DATA.survie;
  let cards=[];
  d.pairs.forEach((p,i)=>{cards.push({pair:i,txt:p.k,kind:"k"});cards.push({pair:i,txt:p.v,kind:"v"});});
  cards=shuffle(cards);
  let first=null,lock=false,matched=0;
  mount.innerHTML = instrBox("Retourne les cartes 2 par 2. Associe chaque <b>technique</b> à ce qu'il faut faire&nbsp;!") +
    `<div class="memgrid" id="grid"></div><div id="bonusZone"></div>`;
  const grid=mount.querySelector("#grid");
  cards.forEach((c,i)=>{
    const card=el(`<div class="memcard" data-i="${i}"><div class="face back">💧</div><div class="face front">${c.txt}</div></div>`);
    card.onclick=()=>flip(i,card,c);
    grid.appendChild(card);
  });
  function flip(i,card,c){
    if(lock||card.classList.contains("flip")||card.classList.contains("done"))return;
    card.classList.add("flip");
    if(!first){first={i,card,c};return;}
    lock=true;
    if(first.c.pair===c.pair && first.i!==i){
      setTimeout(()=>{first.card.classList.add("done");card.classList.add("done");matched++;first=null;lock=false;showToast("🎉 Paire trouvée !","good");if(matched===d.pairs.length)startBonus();},450);
    }else{
      setTimeout(()=>{first.card.classList.remove("flip");card.classList.remove("flip");first=null;lock=false;},900);
    }
  }
  let bonusIdx=0,bonusCorrect=0;
  function startBonus(){
    const bz=mount.querySelector("#bonusZone");
    function askB(){
      if(bonusIdx>=d.bonus.length){return finishStage(Math.round(bonusCorrect/d.bonus.length*100),bonusCorrect,d.bonus.length);}
      const b=d.bonus[bonusIdx];
      bz.innerHTML=`<div class="qcard"><div class="q">⭐ Question bonus : ${b.q}</div><div class="answers" id="bans"></div></div>`;
      const ans=bz.querySelector("#bans");
      b.options.forEach((o,oi)=>{const btn=el(`<button class="ans">${o}</button>`);btn.onclick=()=>{
        if(oi===b.correct){btn.classList.add("good");bonusCorrect++;showToast("✅ Exact !","good");}
        else{btn.classList.add("wrong");showToast("💡 "+b.hint,"bad");}
        [...ans.children].forEach(x=>x.disabled=true);
        setTimeout(()=>{bonusIdx++;askB();},1200);
      };ans.appendChild(btn);});
    }
    bz.scrollIntoView({behavior:"smooth"});askB();
  }
}

/* ---------- JEU 3 : CONSTRUIS L'USINE (ordre — drag & drop) ---------- */
function gameOrder(mount,st){
  const correctOrder=DATA.usine;
  let order=shuffle(correctOrder.map((_,i)=>i));
  while(order.every((v,i)=>v===i)) order=shuffle(correctOrder.map((_,i)=>i));
  mount.innerHTML = instrBox("Glisse chaque étape pour remettre l'usine dans le <b>bon ordre</b>, puis clique sur Vérifier&nbsp;!") +
    `<div class="orderlist" id="ol"></div>
     <div class="center mt"><button class="btn big" id="check">✅ Vérifier l'ordre</button></div>`;
  const ol=mount.querySelector("#ol");
  let dragSrcPos=null;

  function draw(){
    ol.innerHTML="";
    order.forEach((stepIdx,pos)=>{
      const step=correctOrder[stepIdx];
      const row=el(`<div class="orderrow" draggable="true" data-pos="${pos}">
        <div class="drag-handle" title="Glisser pour déplacer">⠿</div>
        <div class="num">${pos+1}</div><div class="ic">${step.ic}</div>
        <div class="txt">${step.t}</div></div>`);

      // — Souris (HTML5 drag) —
      row.addEventListener("dragstart",e=>{
        dragSrcPos=pos; e.dataTransfer.effectAllowed="move";
        setTimeout(()=>row.classList.add("dragging"),0);
      });
      row.addEventListener("dragend",()=>{
        row.classList.remove("dragging");
        ol.querySelectorAll(".drag-over").forEach(r=>r.classList.remove("drag-over"));
      });
      row.addEventListener("dragover",e=>{e.preventDefault();e.dataTransfer.dropEffect="move";});
      row.addEventListener("dragenter",e=>{
        e.preventDefault();
        ol.querySelectorAll(".drag-over").forEach(r=>r.classList.remove("drag-over"));
        if(pos!==dragSrcPos) row.classList.add("drag-over");
      });
      row.addEventListener("dragleave",()=>row.classList.remove("drag-over"));
      row.addEventListener("drop",e=>{
        e.preventDefault();
        ol.querySelectorAll(".drag-over").forEach(r=>r.classList.remove("drag-over"));
        if(dragSrcPos!==null&&dragSrcPos!==pos){
          const[moved]=order.splice(dragSrcPos,1); order.splice(pos,0,moved);
          dragSrcPos=null; draw();
        }
      });

      // — Tactile —
      row.addEventListener("touchstart",e=>{
        dragSrcPos=pos; row.classList.add("dragging");
      },{passive:true});
      row.addEventListener("touchmove",e=>{
        e.preventDefault();
        const touch=e.touches[0];
        ol.querySelectorAll(".drag-over").forEach(r=>r.classList.remove("drag-over"));
        for(const r of ol.querySelectorAll(".orderrow:not(.dragging)")){
          const rect=r.getBoundingClientRect();
          if(touch.clientY>=rect.top&&touch.clientY<=rect.bottom){r.classList.add("drag-over");break;}
        }
      },{passive:false});
      row.addEventListener("touchend",e=>{
        row.classList.remove("dragging");
        const over=ol.querySelector(".drag-over");
        if(over){
          over.classList.remove("drag-over");
          const tPos=+over.dataset.pos;
          if(dragSrcPos!==null&&dragSrcPos!==tPos){
            const[moved]=order.splice(dragSrcPos,1); order.splice(tPos,0,moved); draw();
          }
        }
        dragSrcPos=null;
      },{passive:true});

      ol.appendChild(row);
    });
  }
  draw();

  mount.querySelector("#check").onclick=()=>{
    let correct=0;
    [...ol.children].forEach((row,pos)=>{
      const ok=order[pos]===pos; row.classList.remove("ok","bad");
      row.classList.add(ok?"ok":"bad"); if(ok)correct++;
    });
    if(correct===correctOrder.length){showToast("🏭 Usine parfaite !","good");setTimeout(()=>finishStage(100,correct,correctOrder.length),700);}
    else{showToast(`Encore ${correctOrder.length-correct} à replacer...`,"bad");}
  };
}

/* ---------- JEU 4 : LE CHÂTEAU D'EAU (cloze + eau qui monte) ---------- */
function gameCloze(mount,st){
  const d=DATA.chateau;
  const pool=shuffle(d.answers.slice());
  let blanks=[]; // index -> placed word
  let selWord=null;
  // construit le texte
  let html="", bi=0;
  d.parts.forEach(p=>{ if(p===null){html+=`<span class="blank" data-b="${bi}" id="b${bi}">_____</span>`;bi++;} else html+=escapeHtml(p); });
  const total=bi;
  blanks=new Array(total).fill(null);
  mount.innerHTML = instrBox("Choisis un mot, puis touche un trou pour le placer. Remplis bien le château&nbsp;!") + `
    <div class="clozewrap">
      <div class="towerbox">
        <svg class="tower-svg" viewBox="0 0 200 260">
          <defs><clipPath id="tankClip"><path d="M40 60 Q40 40 100 40 Q160 40 160 60 L160 120 Q160 140 100 140 Q40 140 40 120 Z"/></clipPath></defs>
          <rect x="86" y="140" width="28" height="96" fill="#B0BEC5"/>
          <rect x="70" y="236" width="60" height="14" rx="4" fill="#78909C"/>
          <path d="M40 60 Q40 40 100 40 Q160 40 160 60 L160 120 Q160 140 100 140 Q40 140 40 120 Z" fill="#ECEFF1" stroke="#8E24AA" stroke-width="5"/>
          <rect id="water" x="40" y="140" width="120" height="0" fill="#4FC3F7" clip-path="url(#tankClip)"/>
          <path d="M40 60 Q40 40 100 40 Q160 40 160 60 L160 120 Q160 140 100 140 Q40 140 40 120 Z" fill="none" stroke="#8E24AA" stroke-width="5"/>
        </svg>
        <div style="font-weight:bold;color:#8E24AA" id="fillTxt">0 / ${total} rempli</div>
      </div>
      <div style="flex:1 1 380px">
        <div class="clozetext" id="ct">${html}</div>
        <div class="wordpool" id="wp"></div>
        <div class="center mt"><button class="btn big" id="check">✅ Vérifier le château</button></div>
      </div>
    </div>`;
  const wp=mount.querySelector("#wp");
  pool.forEach(w=>{const b=el(`<button class="word">${w}</button>`);b.onclick=()=>{if(b.classList.contains("used"))return;mount.querySelectorAll(".word").forEach(x=>x.classList.remove("sel"));b.classList.add("sel");selWord={w,el:b};};wp.appendChild(b);});
  mount.querySelectorAll(".blank").forEach(bl=>{
    bl.onclick=()=>{
      const bidx=+bl.dataset.b;
      if(blanks[bidx]){ // libère le mot déjà placé
        const freed=blanks[bidx]; blanks[bidx]=null; bl.textContent="_____"; bl.classList.remove("filled","ok");
        const wbtn=[...wp.children].find(x=>x.textContent===freed && x.classList.contains("used")); if(wbtn)wbtn.classList.remove("used");
      }
      if(selWord){ blanks[bidx]=selWord.w; bl.textContent=selWord.w; bl.classList.add("filled"); selWord.el.classList.add("used"); selWord.el.classList.remove("sel"); selWord=null; }
      updateFill();
    };
  });
  function updateFill(){
    const filled=blanks.filter(Boolean).length;
    mount.querySelector("#fillTxt").textContent=`${filled} / ${total} rempli`;
    mount.querySelector("#water").setAttribute("height", (filled/total*100)+"");
    mount.querySelector("#water").setAttribute("y", (140-(filled/total*100))+"");
  }
  mount.querySelector("#check").onclick=()=>{
    if(blanks.some(b=>!b)){showToast("Remplis tous les trous d'abord !","bad");return;}
    let correct=0;
    blanks.forEach((w,bidx)=>{const bl=mount.querySelector("#b"+bidx);if(w===d.answers[bidx]){correct++;bl.classList.add("ok");}else{bl.classList.remove("ok");}});
    if(correct===total){showToast("🏰 Château rempli, bravo !","good");setTimeout(()=>finishStage(100,correct,total),800);}
    else{
      showToast(`${correct}/${total} bons. Réessaie les autres !`,"bad");
      // renvoie les mauvais mots dans la réserve
      blanks.forEach((w,bidx)=>{if(w!==d.answers[bidx]){const bl=mount.querySelector("#b"+bidx);bl.textContent="_____";bl.classList.remove("filled","ok");const wbtn=[...wp.children].find(x=>x.textContent===w&&x.classList.contains("used"));if(wbtn)wbtn.classList.remove("used");blanks[bidx]=null;}});
      updateFill();
    }
  };
}

  function refreshHP(){

    qz.innerHTML=`<div class="qcard" style="border-color:#E53935;text-align:center;">

        <button class="btn ghost" onclick="renderMap()">🗺️ Carte</button>

  function ask(){

    if(correct>=WIN){ return finishStage(100,WIN,WIN); }
    if(idx>=qs.length){ return finishStage(Math.round(correct/WIN*100),correct,WIN); }

    qz.innerHTML=`<div class="qcard"><div class="q">Question ${idx+1} / ${qs.length} : ${q.q}</div><div class="answers" id="ans"></div></div>`;

  ask();

/* ============================================================
   FIN D'UNE ÉTAPE
   ============================================================ */
function finishStage(pct,correct,total){
  const st=cur.stage;
  // Tri (ex.1) et Pollueurs (ex.5) : atteindre la fin signifie ≤ 1 erreur
  // (la 2ᵉ relance le jeu) -> médaille accordée. Les autres exercices et le
  // boss conservent l'exigence de 100 %.
  const won = hasErrorJoker(st) ? true : (pct===100);
  const prev=student.stages[st.id]||{best:0,completed:false,attempts:0};
  const rec={ best:Math.max(prev.best,pct), completed:prev.completed||won, attempts:(prev.attempts||0)+1 };
  student.stages[st.id]=rec;
  let newBadge=false;
  if(won && !student.badges.includes(st.id)){ student.badges.push(st.id); newBadge=true; if(student.current===cur.index)student.current=Math.min(STAGES.length,cur.index+1); }
  persist();
  renderResult(pct,correct,total,newBadge,won);
}
function renderResult(pct,correct,total,newBadge,won){
  clearErrorUI();
  const st=cur.stage; const win=(won!==undefined)?won:(pct===100);
  if(win)confetti();
  let msg, actions;
  if(win){
    const perfect = pct>=100;
    msg=`<div class="bigbadge" style="background:radial-gradient(circle at 50% 35%,#fff,${st.accent})">${st.badge.emoji}</div>
         <h2>Médaille gagnée&nbsp;!</h2>
         <div class="scorebig">${pct}%</div>
         <div class="fb"><b>${st.badge.name}</b><br>${perfect
            ? `Tu as tout réussi sur ${st.title}&nbsp;! Cette île est terminée. 🎉`
            : `Bravo, tu as réussi ${st.title} avec un seul petit faux pas — bien rattrapé&nbsp;! Cette île est terminée. 🎉`}</div>`;
    const last=student.badges.length===STAGES.length;
    actions = last
      ? `<button class="btn big" onclick="renderFinale()">🏆 Mon diplôme&nbsp;!</button>`
      : `<button class="btn big" onclick="renderMap()">🗺️ Continuer l'aventure</button>`;
  }else{
    msg=`<div class="bigbadge" style="background:radial-gradient(circle at 50% 35%,#fff,#90a4ae);font-size:70px">💪</div>
         <h2>Presque&nbsp;!</h2>
         <div class="scorebig">${pct}%</div>
         <div class="fb">Tu as ${correct} bonnes réponses sur ${total}.<br>Il faut <b>100%</b> pour gagner la médaille. Tu peux réessayer&nbsp;!</div>`;
    actions = `<button class="btn big" onclick="renderGame(${cur.index})">🔁 Réessayer</button>
               <button class="btn ghost" onclick="renderMap()">🗺️ Carte</button>`;
  }
  app.innerHTML = hud() + `<div class="result">${msg}<div class="mt" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">${actions}</div></div>`;
}

  const meds=STAGES.map(s=>`<div class="m" title="${s.badge.name}" style="background:radial-gradient(circle at 50% 35%,#fff,${s.accent})">${s.badge.emoji}</div>`).join("");
  const dateStr=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
  const view=el(`<div class="diplomaView">
      <div class="diploma-sheet" id="diplomaSheet">
        <div class="seal">🏆</div>
        <h2>Diplôme de Championne / Champion de l'Eau</h2>
        <div class="sub">Ce diplôme est décerné à</div>
        <div class="name">${escapeHtml(student.name)}</div>
        <div class="sub">pour avoir terminé toute <b>L'Aventure de l'Eau</b><br>et gagné les ${STAGES.length} médailles&nbsp;!</div>
        <div class="medrow">${meds}</div>
        <div class="sub">Score total : <b>${totalPct(student)}%</b></div>
        <div class="foot">Délivré le ${dateStr} · L'Aventure de l'Eau</div>
      </div>
      <div class="noprint" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
        <button class="btn" onclick="window.print()">🖨️ Imprimer / Enregistrer en PDF</button>
        <button class="btn ghost" onclick="this.closest('.diplomaView').remove()">✖️ Fermer</button>
      </div>
    </div>`);
  document.body.appendChild(view);
}

/* Lance le mini-jeu final AquaRun.
   On transmet l'élève courant (paramètre d'URL + pointeur local) pour qu'AquaRun
   puisse enregistrer son score, lu ensuite par le tableau de bord prof. */
function launchAquaRun(){
  try{ Store.set(curKey(), student?student.name:""); }catch(e){}
  const q = "?code="+encodeURIComponent(CONFIG.sessionCode)
          + (student?("&s="+encodeURIComponent(student.name)):"");
  window.location.href="aquarun/index.html"+q;
}

/* Au démarrage : pousse vers la synchro (Firebase) les scores AquaRun
   enregistrés en local par la page du mini-jeu. */
function flushAquaPending(){
  let names=[]; try{names=JSON.parse(Store.get(aquaPendKey())||"[]");}catch(e){}
  if(!names.length) return;
  names.forEach(n=>{ const s=Sync.loadLocal(n); if(s) Sync.save(s); });
  try{ Store.del(aquaPendKey()); }catch(e){}
}

/* ============================================================
   ESPACE ENSEIGNANT
   ============================================================ */
function openTeacher(){
  const pin=prompt("Code enseignant :");
  if(pin===null)return;
  if(pin!==CONFIG.teacherPIN){showToast("Code incorrect","bad");return;}
  renderTeacher();
}
async function renderTeacher(){
  const synced=Sync.mode==="firebase";
  app.innerHTML = `
    <div class="hud noprint"><div class="who">👩‍🏫 Tableau de bord — ${escapeHtml(CONFIG.sessionCode)}</div>
      <span class="syncbadge ${synced?'sync-on':'sync-off'}" style="margin-left:auto">${synced?'🔴 Suivi en direct (Firebase)':'💾 Suivi local (ce poste)'}</span>
    </div>
    <div class="dash">
      <div class="dashtools noprint">
        <button class="btn sea" onclick="renderTeacher()">🔄 Rafraîchir</button>
        <button class="btn" onclick="exportCSV()">📊 Exporter CSV</button>
        <button class="btn" onclick="exportJSON()">🗂️ Exporter JSON</button>
        <button class="btn ghost" onclick="student?renderMap():renderWelcome()">↩️ Retour</button>
      </div>
      <div class="dashtools noprint" style="border-top:2px dashed #d7e2ea;padding-top:12px;margin-top:4px">
        <span style="font-weight:bold;color:var(--sea-deep);align-self:center">🔍 Accès direct (aperçu)&nbsp;:</span>
        ${STAGES.map((s,i)=>`<button class="btn ghost" style="font-size:.95rem;padding:.45em .9em" onclick="teacherPreview(${i})">${s.emoji} ${s.title}</button>`).join("")}
        <button class="btn sea" style="font-size:.95rem;padding:.45em .9em" onclick="launchAquaRun()">🎮 AquaRun</button>
      </div>
      <div id="dashbody">Chargement...</div>
    </div>`;
  let list=[];
  try{
    list = await Promise.race([
      Sync.getAll(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),5000))
    ]);
  }catch(e){
    list = (typeof Sync._allLocal==="function") ? Sync._allLocal() : [];
    showToast("⚠️ Suivi en direct indisponible — affichage local","bad");
  }
  drawDash(list);
  if(synced){ try{ Sync.onAll(drawDash); }catch(e){} }
}
/* Aperçu enseignant : lance n'importe quelle île même verrouillée */
function teacherPreview(i){
  if(!student) student=newStudent("Aperçu prof");
  renderGame(i);
}
let _lastList=[];
function drawDash(list){
  _lastList=list||[];
  const body=document.getElementById("dashbody"); if(!body)return;
  if(!_lastList.length){body.innerHTML=`<p>Aucun élève pour l'instant. Les prénoms apparaîtront ici dès qu'ils commencent.</p>`;return;}
  const rows=_lastList.sort((a,b)=>(b.lastActive||0)-(a.lastActive||0)).map(s=>{
    const cells=STAGES.map(st=>{const r=s.stages?.[st.id];const v=r?.best||0;const done=r?.completed;
      return `<td title="${st.title}">${done?'<span class="badge-mini">'+st.badge.emoji+'</span>':''}<span class="minibar"><i style="width:${v}%;background:${done?'#43A047':'#FB8C00'}"></i></span></td>`;}).join("");
    const tp=totalPct(s);
    const ago=timeAgo(s.lastActive);
    const aqua=(s.aqua&&s.aqua.best)||0;
    const aquaCell=`<td title="Meilleur score AquaRun${(s.aqua&&s.aqua.stage2)?' — Stage 2 atteint':''}"><b>${aqua}</b>${(s.aqua&&s.aqua.stage2)?' 🏭':''}</td>`;
    return `<tr><td><b>${escapeHtml(s.name)}</b></td><td>${(s.badges||[]).length}/${STAGES.length}</td><td><b>${tp}%</b></td>${cells}${aquaCell}<td style="color:#888;font-size:.85rem">${ago}</td>
      <td class="noprint"><button class="btn ghost" style="font-size:.8rem;padding:.3em .7em" onclick="resetOne('${escapeHtml(s.name).replace(/'/g,"\\'")}')">♻️</button></td></tr>`;
  }).join("");
  const heads=STAGES.map(st=>`<th title="${st.title}">${st.emoji}</th>`).join("");
  body.innerHTML=`<div style="overflow-x:auto"><table>
    <thead><tr><th>Prénom</th><th>Méd.</th><th>Total</th>${heads}<th title="AquaRun — meilleur score">🎮</th><th>Activité</th><th class="noprint"></th></tr></thead>
    <tbody>${rows}</tbody></table></div>
    <p style="color:#888;font-size:.85rem;margin-top:10px">Les barres montrent le meilleur score par jeu. Vert = réussi à 100% (verrouillé). La colonne 🎮 = meilleur score AquaRun (🏭 = Stage 2 atteint).</p>`;
}
function resetOne(name){ if(confirm("Réinitialiser la progression de "+name+" ?")){Sync.reset(name);showToast("Réinitialisé","good");renderTeacher();} }
function timeAgo(ts){ if(!ts)return"—"; const s=Math.floor((Date.now()-ts)/1000); if(s<60)return"à l'instant"; if(s<3600)return Math.floor(s/60)+" min"; if(s<86400)return Math.floor(s/3600)+" h"; return Math.floor(s/86400)+" j"; }
function exportCSV(){
  const head=["Prénom","Médailles","Total %",...STAGES.map(s=>s.title+" %"),"AquaRun (score)","AquaRun Stage 2","Dernière activité"];
  const lines=[head.join(";")];
  _lastList.forEach(s=>{const row=[s.name,(s.badges||[]).length,totalPct(s),...STAGES.map(st=>s.stages?.[st.id]?.best||0),(s.aqua&&s.aqua.best)||0,(s.aqua&&s.aqua.stage2)?"oui":"non",new Date(s.lastActive||Date.now()).toLocaleString("fr-FR")];lines.push(row.join(";"));});
  download("eau_progression.csv",lines.join("\n"),"text/csv");
}
function exportJSON(){ download("eau_progression.json",JSON.stringify(_lastList,null,2),"application/json"); }
function download(fn,txt,mime){const b=new Blob([txt],{type:mime+";charset=utf-8"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=fn;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000);}

/* ============================================================
   UTILS
   ============================================================ */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ============================================================
   DÉMARRAGE
   ============================================================ */
(async function(){ await Sync.init(); flushAquaPending(); renderWelcome(); })();
</script>
